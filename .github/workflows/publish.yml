name: Publish package

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/publish.yml'

jobs:
  publish:
    uses: sneat-co/cicd/.github/workflows/npm-publish.yml@main
    with:
      working-directory: frontend
      build-command: pnpm exec nx build ext-splitus-contract
      publish-command: pnpm exec nx release --yes && git push --follow-tags
    # Required: npm-publish.yml reads secrets.NPM_TOKEN, and a called workflow
    # receives no secrets — not even org-level ones — unless they're passed.
    secrets: inherit
